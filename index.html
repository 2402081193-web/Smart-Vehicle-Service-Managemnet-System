<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Vehicle Service - User Portal</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card" id="loginForm">
            <div class="auth-header">
                <div class="logo-icon">🚗</div>
                <h1>Smart Vehicle Service</h1>
                <p>Login to your account</p>
            </div>
            <div class="auth-body">
                <div class="message" id="loginMessage"></div>
                
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-group">
                        <i>📧</i>
                        <input type="email" id="loginEmail" placeholder="Enter your email">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-group">
                        <i>🔒</i>
                        <input type="password" id="loginPassword" placeholder="Enter your password">
                    </div>
                </div>
                
                <button class="btn btn-primary" id="loginBtn" onclick="handleLogin()">Login</button>
                
                <div class="toggle-link">
                    Don't have an account? <a onclick="showRegister()">Register here</a>
                </div>
                
                <div class="toggle-link">
                    <a href="admin-login.html">Admin Login →</a>
                </div>
            </div>
        </div>

        <div class="auth-card hidden" id="registerForm">
            <div class="auth-header">
                <div class="logo-icon">🚗</div>
                <h1>Create Account</h1>
                <p>Sign up to get started</p>
            </div>
            <div class="auth-body">
                <div class="message" id="registerMessage"></div>
                
                <div class="form-group">
                    <label>Full Name</label>
                    <div class="input-group">
                        <i>👤</i>
                        <input type="text" id="registerName" placeholder="Enter your full name">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-group">
                        <i>📧</i>
                        <input type="email" id="registerEmail" placeholder="Enter your email">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-group">
                        <i>🔒</i>
                        <input type="password" id="registerPassword" placeholder="Minimum 6 characters">
                    </div>
                    <div class="password-strength">
                        <div class="strength-bar" id="strengthBar"></div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Confirm Password</label>
                    <div class="input-group">
                        <i>✓</i>
                        <input type="password" id="registerConfirm" placeholder="Re-enter your password">
                    </div>
                </div>
                
                <button class="btn btn-primary" id="registerBtn" onclick="handleRegister()">Create Account</button>
                
                <div class="toggle-link">
                    Already have an account? <a onclick="showLogin()">Login here</a>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { 
            auth, db,
            signInWithEmailAndPassword,
            createUserWithEmailAndPassword,
            updateProfile,
            doc, setDoc
        } from './js/firebase-config.js';

        function checkPasswordStrength(password) {
            let strength = 0;
            if (password.length >= 6) strength++;
            if (password.length >= 8) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            let width = (strength / 4) * 100;
            let color = strength <= 1 ? '#ff3b30' : strength <= 2 ? '#ff9500' : '#00c853';
            const bar = document.getElementById('strengthBar');
            if (bar) {
                bar.style.width = width + '%';
                bar.style.backgroundColor = color;
            }
        }

        const pwdInput = document.getElementById('registerPassword');
        if (pwdInput) {
            pwdInput.addEventListener('input', function() {
                checkPasswordStrength(this.value);
            });
        }

        window.showRegister = () => {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
            document.getElementById('loginMessage').style.display = 'none';
            document.getElementById('registerMessage').style.display = 'none';
        };

        window.showLogin = () => {
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('loginMessage').style.display = 'none';
            document.getElementById('registerMessage').style.display = 'none';
        };

        window.handleLogin = async () => {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const msgDiv = document.getElementById('loginMessage');
            const loginBtn = document.getElementById('loginBtn');
            
            if (!email || !password) {
                msgDiv.className = 'message message-error';
                msgDiv.textContent = 'Please fill in all fields';
                msgDiv.style.display = 'block';
                return;
            }
            
            loginBtn.disabled = true;
            loginBtn.textContent = 'Logging in...';
            msgDiv.className = 'message message-info';
            msgDiv.textContent = 'Logging in...';
            msgDiv.style.display = 'block';
            
            try {
                await signInWithEmailAndPassword(auth, email, password);
                msgDiv.className = 'message message-success';
                msgDiv.textContent = 'Login successful! Redirecting...';
                
                setTimeout(() => {
                    window.location.href = 'user-dashboard.html';
                }, 1000);
            } catch (error) {
                let errorMsg = 'Login failed: ';
                switch(error.code) {
                    case 'auth/user-not-found':
                        errorMsg += 'User not found. Please register first.';
                        break;
                    case 'auth/wrong-password':
                        errorMsg += 'Incorrect password.';
                        break;
                    case 'auth/invalid-email':
                        errorMsg += 'Invalid email format.';
                        break;
                    default:
                        errorMsg += error.message;
                }
                msgDiv.className = 'message message-error';
                msgDiv.textContent = errorMsg;
                msgDiv.style.display = 'block';
                loginBtn.disabled = false;
                loginBtn.textContent = 'Login';
            }
        };

        window.handleRegister = async () => {
            const name = document.getElementById('registerName').value.trim();
            const email = document.getElementById('registerEmail').value.trim();
            const password = document.getElementById('registerPassword').value;
            const confirm = document.getElementById('registerConfirm').value;
            const msgDiv = document.getElementById('registerMessage');
            const registerBtn = document.getElementById('registerBtn');
            
            if (!name || !email || !password || !confirm) {
                msgDiv.className = 'message message-error';
                msgDiv.textContent = 'Please fill in all fields';
                msgDiv.style.display = 'block';
                return;
            }
            
            if (password !== confirm) {
                msgDiv.className = 'message message-error';
                msgDiv.textContent = 'Passwords do not match';
                msgDiv.style.display = 'block';
                return;
            }
            
            if (password.length < 6) {
                msgDiv.className = 'message message-error';
                msgDiv.textContent = 'Password must be at least 6 characters';
                msgDiv.style.display = 'block';
                return;
            }
            
            registerBtn.disabled = true;
            registerBtn.textContent = 'Creating account...';
            msgDiv.className = 'message message-info';
            msgDiv.textContent = 'Creating account...';
            msgDiv.style.display = 'block';
            
            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                await updateProfile(user, { displayName: name });
                
                await setDoc(doc(db, 'users', user.uid), {
                    name: name,
                    email: email,
                    role: 'user',
                    isActive: true,
                    createdAt: new Date().toISOString()
                });
                
                msgDiv.className = 'message message-success';
                msgDiv.textContent = 'Account created successfully! Redirecting...';
                
                setTimeout(() => {
                    window.location.href = 'user-dashboard.html';
                }, 1500);
            } catch (error) {
                let errorMsg = 'Registration failed: ';
                switch(error.code) {
                    case 'auth/email-already-in-use':
                        errorMsg += 'Email already in use. Please login instead.';
                        break;
                    case 'auth/invalid-email':
                        errorMsg += 'Invalid email format.';
                        break;
                    case 'auth/weak-password':
                        errorMsg += 'Password is too weak.';
                        break;
                    default:
                        errorMsg += error.message;
                }
                msgDiv.className = 'message message-error';
                msgDiv.textContent = errorMsg;
                msgDiv.style.display = 'block';
                registerBtn.disabled = false;
                registerBtn.textContent = 'Create Account';
            }
        };
    </script>
</body>
</html>
