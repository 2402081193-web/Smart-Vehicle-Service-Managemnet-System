<!DOCTYPE html>
<html>
<head>
    <title>Simple Register Test</title>
    <style>
        body { font-family: Arial; padding: 20px; max-width: 500px; margin: 0 auto; }
        input { width: 100%; padding: 8px; margin: 5px 0 15px; }
        button { background: #4CAF50; color: white; padding: 10px; border: none; cursor: pointer; width: 100%; }
        #output { margin-top: 20px; padding: 10px; background: #f5f5f5; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h2>Simple Register Test</h2>
    <p>测试 Email/Password 注册功能</p>
    
    <input type="text" id="name" placeholder="Full name" value="Test User">
    <input type="email" id="email" placeholder="Email" value="test@example.com">
    <input type="password" id="password" placeholder="Password" value="password123">
    
    <button onclick="testRegister()">Test Register</button>
    
    <div id="output"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBFuoNfz4LuXrPdhRRmYiYpe1jGKWdr1pY",
            authDomain: "smart-vehicle-manage-system.firebaseapp.com",
            projectId: "smart-vehicle-manage-system",
            storageBucket: "smart-vehicle-manage-system.firebasestorage.app",
            messagingSenderId: "284858789054",
            appId: "1:284858789054:web:74d13ea854831fcd1802ef"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.testRegister = async function() {
            const output = document.getElementById('output');
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            output.innerHTML = '⏳ 测试开始...<br>';
            
            try {
                // 步骤1: 创建用户
                output.innerHTML += '步骤1: 创建用户...<br>';
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                output.innerHTML += `✅ 用户创建成功! UID: ${user.uid}<br>`;
                
                // 步骤2: 更新名字
                output.innerHTML += '步骤2: 更新用户名字...<br>';
                await updateProfile(user, { displayName: name });
                output.innerHTML += '✅ 名字更新成功<br>';
                
                // 步骤3: 保存到 Firestore
                output.innerHTML += '步骤3: 保存到 Firestore...<br>';
                await setDoc(doc(db, 'users', user.uid), {
                    name: name,
                    email: email,
                    createdAt: new Date().toISOString()
                });
                output.innerHTML += '✅ Firestore 保存成功<br>';
                
                output.innerHTML += '<br><strong style="color:green">🎉 注册成功！请检查 Firebase 控制台</strong>';
                
            } catch (error) {
                output.innerHTML += `<br><strong style="color:red">❌ 错误: ${error.message}</strong>`;
                output.innerHTML += `<br>错误代码: ${error.code}`;
                
                if (error.code === 'auth/email-already-in-use') {
                    output.innerHTML += '<br>⚠️ 这个邮箱已经被使用了，换一个邮箱试试';
                } else if (error.code === 'auth/weak-password') {
                    output.innerHTML += '<br>⚠️ 密码太弱，至少需要6个字符';
                } else if (error.code === 'auth/configuration-not-found') {
                    output.innerHTML += '<br>⚠️ 需要先在 Firebase 控制台启用 Email/Password 认证';
                }
            }
        };
    </script>
</body>
</html>
