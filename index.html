<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Vehicle Service - User Portal</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div class="auth-container">
        <!-- Login Form -->
        <div class="auth-card" id="loginForm">
            <div class="auth-header">
                <div class="logo-icon"></div>
                <h1>Smart Vehicle Service</h1>
                <p>Login to your account</p>
            </div>
            <div class="auth-body">
                <div class="message" id="loginMessage"></div>
                
                <form id="loginFormElement" onsubmit="event.preventDefault(); handleLogin();">
                    <div class="form-group">
                        <label>Email Address</label>
                        <div class="input-group">
                            <i>📧</i>
                            <input type="email" id="loginEmail" placeholder="Enter your email">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Password</label>
                        <div class="input-group">
                            <i>🔒</i>
                            <input type="password" id="loginPassword" placeholder="Enter your password">
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" id="loginBtn">Login</button>
                </form>
                
                <div class="toggle-link">
                    Don't have an account? <a onclick="showRegister()">Register here</a>
                </div>
                
                <div class="toggle-link">
                    <a href="admin-login.html">Admin Login →</a>
                </div>
            </div>
        </div>

        <!-- Register Form (with Phone Number) -->
        <div class="auth-card hidden" id="registerForm">
            <div class="auth-header">
                <div class="logo-icon">🚗</div>
                <h1>Create Account</h1>
                <p>Sign up to get started</p>
            </div>
            <div class="auth-body">
                <div class="message" id="registerMessage"></div>
                
                <form id="registerFormElement" onsubmit="event.preventDefault(); handleRegister();">
                    <div class="form-group">
                        <label>Full Name</label>
                        <div class="input-group">
                            <i>👤</i>
                            <input type="text" id="registerName" placeholder="Enter your full name">
                        </div>
                        <div class="validation-message" id="nameError"></div>
                    </div>
                    
                    <div class="form-group">
                        <label>Email Address</label>
                        <div class="input-group">
                            <i>📧</i>
                            <input type="email" id="registerEmail" placeholder="Enter your email">
                        </div>
                        <div class="validation-message" id="emailError"></div>
                    </div>
                    
                    <!-- 新增手机号字段 -->
                    <div class="form-group">
                        <label>Phone Number</label>
                        <div class="input-group">
                            <i>📱</i>
                            <input type="tel" id="registerPhone" placeholder="e.g., +60123456789 or 0123456789">
                        </div>
                        <div class="validation-message" id="phoneError"></div>
                    </div>
                    
                    <div class="form-group">
                        <label>Password</label>
                        <div class="input-group">
                            <i>🔒</i>
                            <input type="password" id="registerPassword" placeholder="Minimum 6 characters">
                        </div>
                        <div class="password-strength">
                            <div class="strength-bar" id="strengthBar"></div>
                        </div>
                        <div class="strength-text" id="strengthText"></div>
                        <div class="validation-message" id="passwordError"></div>
                    </div>
                    
                    <div class="form-group">
                        <label>Confirm Password</label>
                        <div class="input-group">
                            <i>✓</i>
                            <input type="password" id="registerConfirm" placeholder="Re-enter your password">
                        </div>
                        <div class="validation-message" id="confirmError"></div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" id="registerBtn">Create Account</button>
                </form>
                
                <div class="toggle-link">
                    Already have an account? <a onclick="showLogin()">Login here</a>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { 
            auth, db,
            signInWithEmailAndPassword,
            createUserWithEmailAndPassword,
            updateProfile,
            doc, setDoc
        } from './js/firebase-config.js';

        // 密码强度检测
        function checkPasswordStrength(password) {
            let strength = 0;
            let message = '';
            let color = '';

            if (password.length >= 6) strength++;
            if (password.length >= 8) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;

            if (password.length === 0) {
                message = '';
                color = '#e0e0e0';
            } else if (strength <= 1) {
                message = 'Weak password';
                color = '#ff3b30';
            } else if (strength <= 3) {
                message = 'Medium password';
                color = '#ff9500';
            } else {
                message = 'Strong password';
                color = '#00c853';
            }

            const width = (strength / 5) * 100;
            return { width, color, message };
        }

        // 实时密码强度显示
        const passwordInput = document.getElementById('registerPassword');
        const strengthBar = document.getElementById('strengthBar');
        const strengthText = document.getElementById('strengthText');

        if (passwordInput) {
            passwordInput.addEventListener('input', function() {
                const result = checkPasswordStrength(this.value);
                strengthBar.style.width = result.width + '%';
                strengthBar.style.backgroundColor = result.color;
                strengthText.textContent = result.message;
                strengthText.style.color = result.color;
            });
        }

        // 验证函数
        function validateName(name) {
            if (!name || name.trim().length < 2) {
                return { valid: false, message: 'Name must be at least 2 characters' };
            }
            if (name.trim().length > 50) {
                return { valid: false, message: 'Name must be less than 50 characters' };
            }
            return { valid: true, message: '' };
        }

        function validateEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!email) {
                return { valid: false, message: 'Email is required' };
            }
            if (!emailRegex.test(email)) {
                return { valid: false, message: 'Please enter a valid email address' };
            }
            return { valid: true, message: '' };
        }

        // 手机号验证函数
        function validatePhone(phone) {
            if (!phone) {
                return { valid: false, message: 'Phone number is required' };
            }
            // 移除非数字字符进行验证
            const cleanPhone = phone.replace(/[^0-9+]/g, '');
            if (cleanPhone.length < 8 || cleanPhone.length > 15) {
                return { valid: false, message: 'Phone number must be 8-15 digits' };
            }
            return { valid: true, message: '' };
        }

        function validatePassword(password) {
            if (!password) {
                return { valid: false, message: 'Password is required' };
            }
            if (password.length < 6) {
                return { valid: false, message: 'Password must be at least 6 characters' };
            }
            return { valid: true, message: '' };
        }

        function validateConfirm(password, confirm) {
            if (!confirm) {
                return { valid: false, message: 'Please confirm your password' };
            }
            if (password !== confirm) {
                return { valid: false, message: 'Passwords do not match' };
            }
            return { valid: true, message: '' };
        }

        // UI 函数
        function showMessage(element, type, text) {
            element.className = `message message-${type}`;
            element.innerHTML = text;
            element.style.display = 'block';
        }

        function setLoading(button, isLoading, originalText) {
            if (isLoading) {
                button.disabled = true;
                button.innerHTML = '<span class="spinner"></span> Processing...';
            } else {
                button.disabled = false;
                button.innerHTML = originalText;
            }
        }

        function clearMessages() {
            const messages = document.querySelectorAll('.message');
            messages.forEach(msg => {
                msg.style.display = 'none';
            });
        }

        // 表单切换
        window.showRegister = () => {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
            clearMessages();
        };

        window.showLogin = () => {
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
            clearMessages();
        };

        // 处理登录
        window.handleLogin = async () => {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const msgDiv = document.getElementById('loginMessage');
            const loginBtn = document.getElementById('loginBtn');

            clearMessages();

            if (!email || !password) {
                showMessage(msgDiv, 'error', 'Please fill in all fields');
                return;
            }

            const emailValidation = validateEmail(email);
            if (!emailValidation.valid) {
                showMessage(msgDiv, 'error', emailValidation.message);
                return;
            }

            setLoading(loginBtn, true, 'Login');

            try {
                await signInWithEmailAndPassword(auth, email, password);
                showMessage(msgDiv, 'success', 'Login successful! Redirecting...');
                
                setTimeout(() => {
                    window.location.href = 'user-dashboard.html';
                }, 1000);
            } catch (error) {
                console.error("Login error:", error.code);
                let errorMsg = 'Login failed: ';
                switch(error.code) {
                    case 'auth/user-not-found':
                        errorMsg += 'User not found. Please register first.';
                        break;
                    case 'auth/wrong-password':
                        errorMsg += 'Incorrect password.';
                        break;
                    case 'auth/invalid-email':
                        errorMsg += 'Invalid email format.';
                        break;
                    default:
                        errorMsg += error.message;
                }
                showMessage(msgDiv, 'error', errorMsg);
                setLoading(loginBtn, false, 'Login');
            }
        };

        // 处理注册（包含手机号）
        window.handleRegister = async () => {
            const name = document.getElementById('registerName').value.trim();
            const email = document.getElementById('registerEmail').value.trim();
            const phone = document.getElementById('registerPhone').value.trim();
            const password = document.getElementById('registerPassword').value;
            const confirm = document.getElementById('registerConfirm').value;
            const msgDiv = document.getElementById('registerMessage');
            const registerBtn = document.getElementById('registerBtn');

            clearMessages();
            
            // 清除之前的验证错误
            document.querySelectorAll('.validation-message').forEach(el => {
                el.classList.remove('show');
                el.textContent = '';
            });

            // 验证姓名
            const nameValidation = validateName(name);
            if (!nameValidation.valid) {
                const nameError = document.getElementById('nameError');
                nameError.textContent = nameValidation.message;
                nameError.classList.add('show', 'error');
                return;
            }

            // 验证邮箱
            const emailValidation = validateEmail(email);
            if (!emailValidation.valid) {
                const emailError = document.getElementById('emailError');
                emailError.textContent = emailValidation.message;
                emailError.classList.add('show', 'error');
                return;
            }

            // 验证手机号
            const phoneValidation = validatePhone(phone);
            if (!phoneValidation.valid) {
                const phoneError = document.getElementById('phoneError');
                phoneError.textContent = phoneValidation.message;
                phoneError.classList.add('show', 'error');
                return;
            }

            // 验证密码
            const passwordValidation = validatePassword(password);
            if (!passwordValidation.valid) {
                const passwordError = document.getElementById('passwordError');
                passwordError.textContent = passwordValidation.message;
                passwordError.classList.add('show', 'error');
                return;
            }

            // 验证确认密码
            const confirmValidation = validateConfirm(password, confirm);
            if (!confirmValidation.valid) {
                const confirmError = document.getElementById('confirmError');
                confirmError.textContent = confirmValidation.message;
                confirmError.classList.add('show', 'error');
                return;
            }

            setLoading(registerBtn, true, 'Create Account');

            try {
                // 创建用户
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                // 更新个人资料
                await updateProfile(user, { displayName: name });
                
                // 保存到 Firestore（包含手机号）
                await setDoc(doc(db, 'users', user.uid), {
                    name: name,
                    email: email,
                    phone: phone,  // 新增手机号字段
                    role: 'user',
                    isActive: true,
                    createdAt: new Date().toISOString(),
                    updatedAt: new Date().toISOString()
                });
                
                showMessage(msgDiv, 'success', 'Account created successfully! Redirecting...');
                
                setTimeout(() => {
                    window.location.href = 'user-dashboard.html';
                }, 1500);
                
            } catch (error) {
                console.error("Registration error:", error.code);
                let errorMsg = 'Registration failed: ';
                switch(error.code) {
                    case 'auth/email-already-in-use':
                        errorMsg += 'Email already in use. Please login instead.';
                        break;
                    case 'auth/invalid-email':
                        errorMsg += 'Invalid email format.';
                        break;
                    case 'auth/weak-password':
                        errorMsg += 'Password is too weak.';
                        break;
                    default:
                        errorMsg += error.message;
                }
                showMessage(msgDiv, 'error', errorMsg);
                setLoading(registerBtn, false, 'Create Account');
            }
        };

        // 实时验证
        document.getElementById('registerName')?.addEventListener('input', function() {
            const result = validateName(this.value);
            const errorDiv = document.getElementById('nameError');
            if (!result.valid && this.value) {
                errorDiv.textContent = result.message;
                errorDiv.classList.add('show', 'error');
            } else {
                errorDiv.classList.remove('show');
            }
        });

        document.getElementById('registerEmail')?.addEventListener('input', function() {
            const result = validateEmail(this.value);
            const errorDiv = document.getElementById('emailError');
            if (!result.valid && this.value) {
                errorDiv.textContent = result.message;
                errorDiv.classList.add('show', 'error');
            } else {
                errorDiv.classList.remove('show');
            }
        });

        // 手机号实时验证
        document.getElementById('registerPhone')?.addEventListener('input', function() {
            const result = validatePhone(this.value);
            const errorDiv = document.getElementById('phoneError');
            if (!result.valid && this.value) {
                errorDiv.textContent = result.message;
                errorDiv.classList.add('show', 'error');
            } else if (this.value && result.valid) {
                errorDiv.textContent = '✓ Valid phone number';
                errorDiv.classList.add('show', 'success');
            } else {
                errorDiv.classList.remove('show');
            }
        });

        document.getElementById('registerConfirm')?.addEventListener('input', function() {
            const password = document.getElementById('registerPassword').value;
            const result = validateConfirm(password, this.value);
            const errorDiv = document.getElementById('confirmError');
            if (!result.valid && this.value) {
                errorDiv.textContent = result.message;
                errorDiv.classList.add('show', 'error');
            } else if (this.value && result.valid) {
                errorDiv.textContent = '✓ Passwords match';
                errorDiv.classList.add('show', 'success');
            } else {
                errorDiv.classList.remove('show');
            }
        });
    </script>
</body>
</html>
