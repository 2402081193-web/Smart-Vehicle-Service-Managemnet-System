<!DOCTYPE html>
<html>
<head>
    <title>Ultimate Firebase Test</title>
</head>
<body>
    <h1>Ultimate Firebase Test</h1>
    <div id="status"></div>
    <button onclick="test()">Run Test</button>

    <script type="module">
        // 导入 Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        window.test = async function() {
            const status = document.getElementById('status');
            status.innerHTML = 'Starting test...<br>';
            
            try {
                // 你的配置
                const firebaseConfig = {
                    apiKey: "AIzaSyBFuoNfz4LuXrPdhRRmYiYpe1jGKWdr1pY",
                    authDomain: "smart-vehicle-manage-system.firebaseapp.com",
                    projectId: "smart-vehicle-manage-system",
                    storageBucket: "smart-vehicle-manage-system.firebasestorage.app",
                    messagingSenderId: "284858789054",
                    appId: "1:284858789054:web:74d13ea854831fcd1802ef"
                };
                
                status.innerHTML += '✅ Config loaded<br>';
                
                // 初始化
                const app = initializeApp(firebaseConfig);
                status.innerHTML += '✅ App initialized<br>';
                
                const auth = getAuth(app);
                status.innerHTML += '✅ Auth initialized<br>';
                
                const db = getFirestore(app);
                status.innerHTML += '✅ Firestore initialized<br>';
                
                // 测试匿名登录
                status.innerHTML += 'Testing anonymous login...<br>';
                const userCredential = await signInAnonymously(auth);
                status.innerHTML += `✅ Logged in as: ${userCredential.user.uid}<br>`;
                
                // 测试写入 users 集合
                status.innerHTML += 'Testing write to users collection...<br>';
                const testUserRef = doc(db, 'users', 'test-' + Date.now());
                await setDoc(testUserRef, {
                    name: 'Test User',
                    email: 'test@example.com',
                    timestamp: new Date().toISOString()
                });
                status.innerHTML += '✅ Write to users collection successful!<br>';
                
                // 测试写入 test 集合
                status.innerHTML += 'Testing write to test collection...<br>';
                const testRef = await addDoc(collection(db, 'test'), {
                    message: 'Hello',
                    timestamp: new Date().toISOString()
                });
                status.innerHTML += `✅ Write to test collection successful! ID: ${testRef.id}<br>`;
                
                status.innerHTML += '<br><strong style="color:green">🎉 ALL TESTS PASSED! Firebase is working correctly!</strong>';
                
            } catch (error) {
                status.innerHTML += `<br><strong style="color:red">❌ ERROR: ${error.message}</strong>`;
                status.innerHTML += `<br>Error code: ${error.code}`;
                console.error(error);
            }
        };
    </script>
</body>
</html>
