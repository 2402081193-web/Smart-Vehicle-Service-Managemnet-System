<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Vehicle Service - User Portal</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card" id="loginForm">
            <div class="auth-header">
                <div class="logo-icon">🚗</div>
                <h1>Smart Vehicle Service</h1>
                <p>Login to your account</p>
            </div>
            <div class="auth-body">
                <div class="message" id="loginMessage"></div>
                
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-group">
                        <i>📧</i>
                        <input type="email" id="loginEmail" placeholder="Enter your email">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-group">
                        <i>🔒</i>
                        <input type="password" id="loginPassword" placeholder="Enter your password">
                    </div>
                </div>
                
                <button class="btn btn-primary" onclick="handleLogin()">Login</button>
                
                <div class="toggle-link">
                    Don't have an account? <a onclick="showRegister()">Register here</a>
                </div>
                
                <div class="toggle-link">
                    <a href="admin-login.html">Admin Login →</a>
                </div>
            </div>
        </div>

        <div class="auth-card hidden" id="registerForm">
            <div class="auth-header">
                <div class="logo-icon">🚗</div>
                <h1>Create Account</h1>
                <p>Sign up to get started</p>
            </div>
            <div class="auth-body">
                <div class="message" id="registerMessage"></div>
                
                <div class="form-group">
                    <label>Full Name</label>
                    <div class="input-group">
                        <i>👤</i>
                        <input type="text" id="registerName" placeholder="Enter your full name">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-group">
                        <i>📧</i>
                        <input type="email" id="registerEmail" placeholder="Enter your email">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-group">
                        <i>🔒</i>
                        <input type="password" id="registerPassword" placeholder="Minimum 6 characters">
                    </div>
                    <div class="password-strength">
                        <div class="strength-bar" id="strengthBar"></div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Confirm Password</label>
                    <div class="input-group">
                        <i>✓</i>
                        <input type="password" id="registerConfirm" placeholder="Re-enter your password">
                    </div>
                </div>
                
                <button class="btn btn-primary" onclick="handleRegister()">Create Account</button>
                
                <div class="toggle-link">
                    Already have an account? <a onclick="showLogin()">Login here</a>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { 
            auth, db,
            signInWithEmailAndPassword,
            createUserWithEmailAndPassword,
            updateProfile,
            onAuthStateChanged,
            doc, setDoc
        } from './js/firebase-config.js';

        onAuthStateChanged(auth, (user) => {
            if (user) window.location.href = 'user-dashboard.html';
        });

        function checkPasswordStrength(password) {
            let strength = 0;
            if (password.length >= 6) strength++;
            if (password.length >= 8) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            let width = (strength / 4) * 100;
            let color = strength <= 1 ? '#ff3b30' : strength <= 2 ? '#ff9500' : '#00c853';
            document.getElementById('strengthBar').style.width = width + '%';
            document.getElementById('strengthBar').style.backgroundColor = color;
        }

        document.getElementById('registerPassword')?.addEventListener('input', function() {
            checkPasswordStrength(this.value);
        });

        window.showRegister = () => {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
        };

        window.showLogin = () => {
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
        };

        window.handleLogin = async () => {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const msgDiv = document.getElementById('loginMessage');
            
            try {
                await signInWithEmailAndPassword(auth, email, password);
                msgDiv.className = 'message message-success';
                msgDiv.textContent = 'Login successful! Redirecting...';
                msgDiv.style.display = 'block';
                setTimeout(() => window.location.href = 'user-dashboard.html', 1000);
            } catch (error) {
                msgDiv.className = 'message message-error';
                msgDiv.textContent = error.message;
                msgDiv.style.display = 'block';
            }
        };

        window.handleRegister = async () => {
            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const confirm = document.getElementById('registerConfirm').value;
            const msgDiv = document.getElementById('registerMessage');
            
            if (password !== confirm) {
                msgDiv.className = 'message message-error';
                msgDiv.textContent = 'Passwords do not match';
                msgDiv.style.display = 'block';
                return;
            }
            
            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                await updateProfile(userCredential.user, { displayName: name });
                await setDoc(doc(db, 'users', userCredential.user.uid), {
                    name, email, role: 'user', createdAt: new Date().toISOString()
                });
                msgDiv.className = 'message message-success';
                msgDiv.textContent = 'Account created! Redirecting...';
                msgDiv.style.display = 'block';
                setTimeout(() => window.location.href = 'user-dashboard.html', 1500);
            } catch (error) {
                msgDiv.className = 'message message-error';
                msgDiv.textContent = error.message;
                msgDiv.style.display = 'block';
            }
        };
    </script>
</body>
</html>
