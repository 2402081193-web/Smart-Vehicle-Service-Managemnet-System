<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Vehicle Service - Admin Login</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo-icon">👑</div>
                <h1>Admin Portal</h1>
                <p>Secure administrator access</p>
            </div>
            <div class="auth-body">
                <div class="message" id="adminMessage"></div>
                
                <!-- 用 form 标签包裹 -->
                <form id="adminLoginForm" onsubmit="event.preventDefault(); handleAdminLogin();">
                    <div class="form-group">
                        <label>Admin Email</label>
                        <div class="input-group">
                            <i>📧</i>
                            <input type="email" id="adminEmail" placeholder="admin@system.com">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Admin Password</label>
                        <div class="input-group">
                            <i>🔒</i>
                            <input type="password" id="adminPassword" placeholder="Enter password">
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" id="loginBtn">Login as Admin</button>
                </form>
                
                <div class="toggle-link">
                    <a href="index.html">← Back to User Login</a>
                </div>
                
                <div class="info-text">
                    <strong>⚠️ First Time Setup:</strong> Click below to create admin account
                </div>
                
                <button class="btn btn-secondary" id="createBtn" onclick="createAdminAccount()">
                    Create Admin Account (First Time)
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { 
            auth, db, 
            signInWithEmailAndPassword, 
            createUserWithEmailAndPassword, 
            updateProfile,
            doc, setDoc, getDoc,
            collection, query, where, getDocs
        } from './js/firebase-config.js';

        window.createAdminAccount = async () => {
            const msgDiv = document.getElementById('adminMessage');
            const createBtn = document.getElementById('createBtn');
            
            msgDiv.className = 'message message-info';
            msgDiv.textContent = 'Creating admin account...';
            msgDiv.style.display = 'block';
            
            createBtn.disabled = true;
            createBtn.textContent = 'Creating...';
            
            try {
                console.log("开始创建 admin 账号...");
                
                // 创建 Admin 用户
                const userCredential = await createUserWithEmailAndPassword(auth, 'admin@system.com', 'admin123');
                const user = userCredential.user;
                console.log("用户创建成功:", user.uid);
                
                // 更新个人资料
                await updateProfile(user, { displayName: 'Administrator' });
                console.log("个人资料更新成功");
                
                // 保存到 Firestore
                await setDoc(doc(db, 'users', user.uid), {
                    name: 'Administrator',
                    email: 'admin@system.com',
                    role: 'admin',
                    isActive: true,
                    createdAt: new Date().toISOString()
                });
                console.log("Firestore 保存成功");
                
                msgDiv.className = 'message message-success';
                msgDiv.innerHTML = '✅ Admin account created successfully!<br>📧 Email: admin@system.com<br>🔑 Password: admin123<br><br>You can now login below.';
                
                document.getElementById('adminEmail').value = 'admin@system.com';
                document.getElementById('adminPassword').value = 'admin123';
                
            } catch (error) {
                console.error("Create admin error:", error);
                console.error("错误代码:", error.code);
                console.error("错误信息:", error.message);
                
                if (error.code === 'auth/email-already-in-use') {
                    msgDiv.className = 'message message-info';
                    msgDiv.innerHTML = '✅ Admin account already exists. Please login below.';
                    document.getElementById('adminEmail').value = 'admin@system.com';
                } else if (error.code === 'permission-denied') {
                    msgDiv.className = 'message message-error';
                    msgDiv.innerHTML = '❌ Permission denied!<br>Please update Firestore rules in Firebase Console to:<br><code style="background:#333; padding:2px 5px; border-radius:3px;">allow read, write: if true;</code>';
                } else {
                    msgDiv.className = 'message message-error';
                    msgDiv.textContent = 'Error: ' + error.message;
                }
            } finally {
                createBtn.disabled = false;
                createBtn.textContent = 'Create Admin Account (First Time)';
            }
        };

        window.handleAdminLogin = async () => {
            const email = document.getElementById('adminEmail').value.trim();
            const password = document.getElementById('adminPassword').value;
            const msgDiv = document.getElementById('adminMessage');
            const loginBtn = document.getElementById('loginBtn');
            
            if (!email || !password) {
                msgDiv.className = 'message message-error';
                msgDiv.textContent = 'Please fill in all fields';
                msgDiv.style.display = 'block';
                return;
            }
            
            loginBtn.disabled = true;
            loginBtn.textContent = 'Logging in...';
            msgDiv.className = 'message message-info';
            msgDiv.textContent = 'Logging in...';
            msgDiv.style.display = 'block';
            
            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                const userDoc = await getDoc(doc(db, 'users', user.uid));
                const userData = userDoc.data();
                
                if (userData?.role === 'admin' || email === 'admin@system.com') {
                    msgDiv.className = 'message message-success';
                    msgDiv.textContent = 'Admin login successful! Redirecting...';
                    
                    setTimeout(() => {
                        window.location.href = 'admin-dashboard.html';
                    }, 1000);
                } else {
                    throw new Error('Not an admin account');
                }
            } catch (error) {
                msgDiv.className = 'message message-error';
                if (error.code === 'auth/user-not-found') {
                    msgDiv.innerHTML = '❌ Admin account not found.<br>Please click "Create Admin Account" first.';
                } else if (error.message === 'Not an admin account') {
                    msgDiv.innerHTML = '❌ This account is not an admin account.';
                } else {
                    msgDiv.textContent = 'Login failed: ' + error.message;
                }
                msgDiv.style.display = 'block';
                loginBtn.disabled = false;
                loginBtn.textContent = 'Login as Admin';
            }
        };
    </script>
</body>
</html>
