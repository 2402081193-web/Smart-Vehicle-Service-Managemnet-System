<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Vehicle Service - Admin Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo-icon">👑</div>
                <h1>Admin Portal</h1>
                <p>Secure administrator access</p>
            </div>
            <div class="auth-body">
                <div class="message" id="adminMessage"></div>
                
                <div class="form-group">
                    <label>Admin Email</label>
                    <div class="input-group">
                        <i>📧</i>
                        <input type="email" id="adminEmail" placeholder="admin@system.com">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Admin Password</label>
                    <div class="input-group">
                        <i>🔒</i>
                        <input type="password" id="adminPassword" placeholder="Enter password">
                    </div>
                </div>
                
                <button class="btn btn-primary" id="loginBtn" onclick="handleAdminLogin()">Login as Admin</button>
                
                <div class="toggle-link">
                    <a href="index.html">← Back to User Login</a>
                </div>
                
                <div class="info-text">
                    <strong>⚠️ First Time Setup:</strong> Click below to create admin account
                </div>
                
                <button class="btn btn-secondary" id="createBtn" onclick="createAdminAccount()">
                    Create Admin Account (First Time)
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { 
            auth, db, 
            signInWithEmailAndPassword, 
            createUserWithEmailAndPassword, 
            updateProfile,
            doc, setDoc, getDoc,
            collection, query, where, getDocs
        } from './js/firebase-config.js';

        // 检查是否已登录 - 使用 setTimeout 避免立即重定向
        // 注意：这里不自动重定向，让用户自己点击登录
        
        window.createAdminAccount = async () => {
            const msgDiv = document.getElementById('adminMessage');
            const createBtn = document.getElementById('createBtn');
            const loginBtn = document.getElementById('loginBtn');
            
            msgDiv.className = 'message message-info';
            msgDiv.textContent = 'Creating admin account...';
            msgDiv.style.display = 'block';
            
            // 禁用按钮防止重复点击
            createBtn.disabled = true;
            createBtn.textContent = 'Creating...';
            
            try {
                // 先检查 admin 是否已存在
                const usersRef = collection(db, 'users');
                const q = query(usersRef, where('email', '==', 'admin@system.com'));
                const querySnapshot = await getDocs(q);
                
                if (!querySnapshot.empty) {
                    msgDiv.className = 'message message-info';
                    msgDiv.innerHTML = '✅ Admin account already exists!<br>Please login below.';
                    document.getElementById('adminEmail').value = 'admin@system.com';
                    document.getElementById('adminPassword').value = 'admin123';
                    createBtn.disabled = false;
                    createBtn.textContent = 'Create Admin Account (First Time)';
                    return;
                }
                
                // 创建 Admin 用户
                const userCredential = await createUserWithEmailAndPassword(auth, 'admin@system.com', 'admin123');
                const user = userCredential.user;
                
                await updateProfile(user, { displayName: 'Administrator' });
                
                await setDoc(doc(db, 'users', user.uid), {
                    name: 'Administrator',
                    email: 'admin@system.com',
                    role: 'admin',
                    isActive: true,
                    createdAt: new Date().toISOString()
                });
                
                msgDiv.className = 'message message-success';
                msgDiv.innerHTML = '✅ Admin account created successfully!<br>📧 Email: admin@system.com<br>🔑 Password: admin123<br><br>You can now login below.';
                
                // 填充表单
                document.getElementById('adminEmail').value = 'admin@system.com';
                document.getElementById('adminPassword').value = 'admin123';
                
                createBtn.disabled = false;
                createBtn.textContent = 'Create Admin Account (First Time)';
                
            } catch (error) {
                console.error("Create admin error:", error);
                if (error.code === 'auth/email-already-in-use') {
                    msgDiv.className = 'message message-info';
                    msgDiv.innerHTML = '✅ Admin account already exists. Please login below.';
                    document.getElementById('adminEmail').value = 'admin@system.com';
                } else {
                    msgDiv.className = 'message message-error';
                    msgDiv.textContent = 'Error: ' + error.message;
                }
                createBtn.disabled = false;
                createBtn.textContent = 'Create Admin Account (First Time)';
            }
        };

        window.handleAdminLogin = async () => {
            const email = document.getElementById('adminEmail').value.trim();
            const password = document.getElementById('adminPassword').value;
            const msgDiv = document.getElementById('adminMessage');
            const loginBtn = document.getElementById('loginBtn');
            
            if (!email || !password) {
                msgDiv.className = 'message message-error';
                msgDiv.textContent = 'Please fill in all fields';
                msgDiv.style.display = 'block';
                return;
            }
            
            // 禁用按钮防止重复点击
            loginBtn.disabled = true;
            loginBtn.textContent = 'Logging in...';
            msgDiv.className = 'message message-info';
            msgDiv.textContent = 'Logging in...';
            msgDiv.style.display = 'block';
            
            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                // 检查是否是 admin
                const userDoc = await getDoc(doc(db, 'users', user.uid));
                const userData = userDoc.data();
                
                if (userData?.role === 'admin' || email === 'admin@system.com') {
                    msgDiv.className = 'message message-success';
                    msgDiv.textContent = 'Admin login successful! Redirecting...';
                    
                    // 延迟跳转，让用户看到成功消息
                    setTimeout(() => {
                        window.location.href = 'admin-dashboard.html';
                    }, 1000);
                } else {
                    throw new Error('Not an admin account');
                }
            } catch (error) {
                console.error("Login error:", error);
                msgDiv.className = 'message message-error';
                if (error.code === 'auth/user-not-found') {
                    msgDiv.innerHTML = '❌ Admin account not found.<br>Please click "Create Admin Account" first.';
                } else if (error.message === 'Not an admin account') {
                    msgDiv.innerHTML = '❌ This account is not an admin account.';
                } else {
                    msgDiv.textContent = 'Login failed: ' + error.message;
                }
                msgDiv.style.display = 'block';
                loginBtn.disabled = false;
                loginBtn.textContent = 'Login as Admin';
            }
        };
    </script>
</body>
</html>
