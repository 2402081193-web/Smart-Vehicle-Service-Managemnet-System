<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Vehicle Service - Admin Login</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo-icon">👑</div>
                <h1>Admin Portal</h1>
                <p>Secure administrator access</p>
            </div>
            <div class="auth-body">
                <div class="message" id="adminMessage"></div>
                
                <form id="adminLoginForm" onsubmit="event.preventDefault(); handleAdminLogin();">
                    <div class="form-group">
                        <label>Email Address</label>
                        <div class="input-group">
                            <i>📧</i>
                            <input type="email" id="adminEmail" placeholder="Enter your email">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Password</label>
                        <div class="input-group">
                            <i>🔒</i>
                            <input type="password" id="adminPassword" placeholder="Enter your password">
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" id="loginBtn">Login as Admin</button>
                </form>
                
                <div class="toggle-link">
                    <a href="index.html">← Back to User Login</a>
                </div>
                
                <div class="info-text">
                    <strong>ℹ️ How to become Admin:</strong><br>
                    1. Register as a normal user first<br>
                    2. Contact the existing Admin to promote your account<br>
                    3. Or use the default admin account: <strong>admin@system.com</strong>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { 
            auth, db, 
            signInWithEmailAndPassword, 
            doc, getDoc
        } from './js/firebase-config.js';

        window.handleAdminLogin = async () => {
            const email = document.getElementById('adminEmail').value.trim();
            const password = document.getElementById('adminPassword').value;
            const msgDiv = document.getElementById('adminMessage');
            const loginBtn = document.getElementById('loginBtn');
            
            if (!email || !password) {
                msgDiv.className = 'message message-error';
                msgDiv.textContent = 'Please fill in all fields';
                msgDiv.style.display = 'block';
                return;
            }
            
            loginBtn.disabled = true;
            loginBtn.textContent = 'Logging in...';
            msgDiv.className = 'message message-info';
            msgDiv.textContent = 'Logging in...';
            msgDiv.style.display = 'block';
            
            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                const userDoc = await getDoc(doc(db, 'users', user.uid));
                const userData = userDoc.data();
                
                // 检查是否是 admin (role === 'admin')
                if (userData?.role === 'admin') {
                    msgDiv.className = 'message message-success';
                    msgDiv.textContent = 'Admin login successful! Redirecting...';
                    
                    setTimeout(() => {
                        window.location.href = 'admin-dashboard.html';
                    }, 1000);
                } else {
                    msgDiv.className = 'message message-error';
                    msgDiv.innerHTML = '❌ You do not have admin privileges.<br><br>Only users promoted to Admin can access this portal.';
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Login as Admin';
                }
            } catch (error) {
                msgDiv.className = 'message message-error';
                if (error.code === 'auth/user-not-found') {
                    msgDiv.innerHTML = '❌ Account not found.<br>Please register as a user first.';
                } else if (error.code === 'auth/wrong-password') {
                    msgDiv.textContent = 'Incorrect password.';
                } else {
                    msgDiv.textContent = 'Login failed: ' + error.message;
                }
                msgDiv.style.display = 'block';
                loginBtn.disabled = false;
                loginBtn.textContent = 'Login as Admin';
            }
        };
    </script>
</body>
</html>
