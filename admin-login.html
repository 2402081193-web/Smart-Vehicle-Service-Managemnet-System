<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Vehicle Service - Admin Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo-icon">👑</div>
                <h1>Admin Portal</h1>
                <p>Secure administrator access</p>
            </div>
            <div class="auth-body">
                <div class="message" id="adminMessage"></div>
                
                <div class="form-group">
                    <label>Admin Email</label>
                    <div class="input-group">
                        <i>📧</i>
                        <input type="email" id="adminEmail" placeholder="admin@system.com">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Admin Password</label>
                    <div class="input-group">
                        <i>🔒</i>
                        <input type="password" id="adminPassword" placeholder="Enter password">
                    </div>
                </div>
                
                <button class="btn btn-primary" onclick="handleAdminLogin()">Login as Admin</button>
                
                <div class="toggle-link">
                    <a href="index.html">← Back to User Login</a>
                </div>
                
                <div class="toggle-link" style="margin-top: 15px; font-size: 12px;">
                    <strong>⚠️ First Time Setup:</strong> Register as admin first using the button below
                </div>
                
                <button class="btn btn-secondary" onclick="createAdminAccount()" style="margin-top: 10px;">
                    Create Admin Account (First Time)
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile, onAuthStateChanged, doc, setDoc } from './js/firebase-config.js';

        // 检查是否已登录 - 不会自动跳转
        onAuthStateChanged(auth, (user) => {
            if (user && user.email === 'admin@system.com') {
                const msgDiv = document.getElementById('adminMessage');
                msgDiv.className = 'message message-info';
                msgDiv.textContent = `Already logged in as Admin. `;
                msgDiv.style.display = 'block';
                
                const btn = document.createElement('button');
                btn.textContent = 'Go to Admin Dashboard';
                btn.className = 'btn btn-primary';
                btn.style.marginTop = '10px';
                btn.onclick = () => window.location.href = 'admin-dashboard.html';
                msgDiv.appendChild(document.createElement('br'));
                msgDiv.appendChild(btn);
            }
        });

        window.createAdminAccount = async () => {
            const msgDiv = document.getElementById('adminMessage');
            msgDiv.className = 'message message-info';
            msgDiv.textContent = 'Creating admin account...';
            msgDiv.style.display = 'block';
            
            try {
                // 创建 Admin 用户
                const userCredential = await createUserWithEmailAndPassword(auth, 'admin@system.com', 'admin123');
                const user = userCredential.user;
                
                await updateProfile(user, { displayName: 'Administrator' });
                
                await setDoc(doc(db, 'users', user.uid), {
                    name: 'Administrator',
                    email: 'admin@system.com',
                    role: 'admin',
                    isActive: true,
                    createdAt: new Date().toISOString()
                });
                
                msgDiv.className = 'message message-success';
                msgDiv.innerHTML = '✅ Admin account created successfully!<br>Email: admin@system.com<br>Password: admin123<br><br>You can now login below.';
                
                // 填充表单
                document.getElementById('adminEmail').value = 'admin@system.com';
                document.getElementById('adminPassword').value = 'admin123';
                
            } catch (error) {
                console.error("Create admin error:", error);
                if (error.code === 'auth/email-already-in-use') {
                    msgDiv.className = 'message message-info';
                    msgDiv.innerHTML = 'Admin account already exists. Please login below.';
                    document.getElementById('adminEmail').value = 'admin@system.com';
                } else {
                    msgDiv.className = 'message message-error';
                    msgDiv.textContent = 'Error: ' + error.message;
                }
            }
        };

        window.handleAdminLogin = async () => {
            const email = document.getElementById('adminEmail').value.trim();
            const password = document.getElementById('adminPassword').value;
            const msgDiv = document.getElementById('adminMessage');
            
            if (!email || !password) {
                msgDiv.className = 'message message-error';
                msgDiv.textContent = 'Please fill in all fields';
                msgDiv.style.display = 'block';
                return;
            }
            
            msgDiv.className = 'message message-info';
            msgDiv.textContent = 'Logging in...';
            msgDiv.style.display = 'block';
            
            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                // 检查是否是 admin
                const userDoc = await getDocs(query(collection(db, 'users'), where('uid', '==', user.uid)));
                let isAdmin = false;
                userDoc.forEach(doc => {
                    if (doc.data().role === 'admin') isAdmin = true;
                });
                
                if (email === 'admin@system.com' || isAdmin) {
                    msgDiv.className = 'message message-success';
                    msgDiv.textContent = 'Admin login successful! Redirecting...';
                    setTimeout(() => {
                        window.location.href = 'admin-dashboard.html';
                    }, 1000);
                } else {
                    throw new Error('Not an admin account');
                }
            } catch (error) {
                msgDiv.className = 'message message-error';
                if (error.code === 'auth/user-not-found') {
                    msgDiv.innerHTML = 'Admin account not found. Please click "Create Admin Account" first.';
                } else {
                    msgDiv.textContent = 'Login failed: ' + error.message;
                }
                msgDiv.style.display = 'block';
            }
        };
        
        // 导入 query 和 collection
        import { query, collection, where, getDocs } from './js/firebase-config.js';
        window.query = query;
        window.collection = collection;
        window.where = where;
        window.getDocs = getDocs;
    </script>
</body>
</html>
